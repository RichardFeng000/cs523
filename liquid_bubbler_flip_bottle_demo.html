<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Liquid Motion Bubbler — Flip Bottle Demo</title>
  <style>
    html, body { margin:0; height:100%; background:#0b1020; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto; }
    #wrap { height:100%; display:flex; align-items:center; justify-content:center; padding:18px; box-sizing:border-box; }
    canvas { border-radius:18px; background: radial-gradient(1200px 600px at 50% 20%, rgba(255,255,255,0.10), rgba(255,255,255,0.02) 40%, rgba(0,0,0,0.25)); box-shadow: 0 18px 70px rgba(0,0,0,0.55); }
    .hud {
      position: fixed; left: 16px; top: 14px; color: rgba(255,255,255,0.85);
      font-size: 13px; line-height: 1.35; user-select: none;
      background: rgba(0,0,0,0.25); backdrop-filter: blur(8px);
      padding: 10px 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.10);
      max-width: 380px;
    }
    .hud b { color: #fff; }
    .pill { display:inline-block; padding:2px 8px; border-radius:999px; border:1px solid rgba(255,255,255,0.14); margin-right:6px; }
  </style>
</head>
<body>
  <div class="hud">
    <div><span class="pill">Click / Space</span><b>Flip the bottle</b> (visual rotation + gravity reverse)</div>
    <div><span class="pill">Mouse move</span>stir (in bottle space)</div>
    <div style="margin-top:6px; opacity:.85">
      Abstraction of a liquid motion toy: two densities, buoyancy, damping, boundaries.
    </div>
  </div>

  <div id="wrap">
    <canvas id="c" width="920" height="620"></canvas>
  </div>

<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  function clamp(v, a, b){ return Math.max(a, Math.min(b, v)); }
  function lerp(a,b,t){ return a + (b-a)*t; }
  function normAngle(a){
    // keep in [-pi, pi]
    a = (a + Math.PI) % (2*Math.PI);
    if (a < 0) a += 2*Math.PI;
    return a - Math.PI;
  }

  // ====== State ======
  const state = {
    viewW: 920, viewH: 620,
    particles: [],
    gravity: 150,          // px/s^2 (always "down" in local bottle space)
    gSign: 1,              // +1 normal, -1 inverted (local physics)
    // bottle rotation (visual)
    angle: 0,
    targetAngle: 0,
    // mouse in local bottle coordinates
    mouse: { x: 0, y: 0, vx: 0, vy: 0 },
    lastT: performance.now(),
    impulse: 0
  };

  // ====== Resize ======
  function fit() {
    const maxW = Math.min(980, window.innerWidth - 36);
    const maxH = Math.min(720, window.innerHeight - 36);
    const aspect = 920/620;
    let w = maxW, h = Math.round(w/aspect);
    if (h > maxH) { h = maxH; w = Math.round(h*aspect); }
    const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    canvas.width = Math.round(w * dpr);
    canvas.height = Math.round(h * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    state.viewW = w; state.viewH = h;
  }

  // ====== Container shape in LOCAL bottle space ======
  function containerX(y) {
    const H = state.viewH;
    const W = state.viewW;
    const t = (y / H) * 2 - 1; // [-1..1]
    const waist = 0.52 + 0.22 * (t*t); // narrow mid
    const half = (W * 0.33) * waist;
    const cx = W * 0.5;
    return [cx - half, cx + half];
  }

  // ====== Particles (two "fluids") ======
  const FLUIDS = [
    { density: 0.82, radius: 3.1, colorA: 'rgba(90,190,255,0.9)',  colorB: 'rgba(25,120,210,0.32)' },
    { density: 1.35, radius: 3.6, colorA: 'rgba(80,255,170,0.9)',  colorB: 'rgba(10,170,90,0.34)'  }
  ];

  function seedParticles() {
    state.particles.length = 0;
    const H = state.viewH;
    const N = 920;
    for (let i = 0; i < N; i++) {
      const f = (i < N*0.54) ? 0 : 1; // more light
      const spec = FLUIDS[f];
      const y = Math.random() * H;
      const [xl, xr] = containerX(y);
      const x = xl + 10 + Math.random() * (xr - xl - 20);
      state.particles.push({
        x, y,
        vx: (Math.random()-0.5)*10,
        vy: (Math.random()-0.5)*10,
        f,
        r: spec.radius
      });
    }
  }

  // ====== Flip: rotate bottle + invert gravity ======
  function flipBottle() {
    // rotate 180 degrees visually
    state.targetAngle = normAngle(state.targetAngle + Math.PI);
    // invert gravity direction in local physics
    state.gSign *= -1;
    // small shake impulse
    state.impulse = 1.0;
  }

  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space') { e.preventDefault(); flipBottle(); }
  });
  canvas.addEventListener('pointerdown', () => flipBottle());

  // Convert screen mouse to LOCAL bottle coordinates (inverse rotation around center)
  function screenToLocal(x, y) {
    const W = state.viewW, H = state.viewH;
    const cx = W*0.5, cy = H*0.5;
    const dx = x - cx, dy = y - cy;
    const a = -state.angle; // inverse
    const ca = Math.cos(a), sa = Math.sin(a);
    return {
      x: cx + dx*ca - dy*sa,
      y: cy + dx*sa + dy*ca
    };
  }

  function setMouse(e) {
    const rect = canvas.getBoundingClientRect();
    const sx = (e.clientX - rect.left) / rect.width * state.viewW;
    const sy = (e.clientY - rect.top) / rect.height * state.viewH;
    const local = screenToLocal(sx, sy);

    const mx = state.mouse.x, my = state.mouse.y;
    state.mouse.vx = (local.x - mx) * 14;
    state.mouse.vy = (local.y - my) * 14;
    state.mouse.x = local.x; state.mouse.y = local.y;
  }
  canvas.addEventListener('pointermove', setMouse);
  canvas.addEventListener('pointerenter', setMouse);

  // ====== Simulation in LOCAL bottle space ======
  function step(dt) {
    const W = state.viewW, H = state.viewH;
    const P = state.particles;

    // neighbor buckets
    const cell = 16;
    const gw = Math.ceil(W / cell);
    const gh = Math.ceil(H / cell);
    const buckets = new Array(gw * gh);
    for (let i = 0; i < buckets.length; i++) buckets[i] = [];

    for (let i = 0; i < P.length; i++) {
      const p = P[i];
      const cx = clamp((p.x / cell) | 0, 0, gw-1);
      const cy = clamp((p.y / cell) | 0, 0, gh-1);
      buckets[cx + cy*gw].push(i);
    }

    // decay shake
    state.impulse *= Math.pow(0.05, dt);
    const shake = state.impulse;

    const mx = state.mouse.x, my = state.mouse.y;
    const mvx = state.mouse.vx, mvy = state.mouse.vy;

    for (let i = 0; i < P.length; i++) {
      const p = P[i];
      const spec = FLUIDS[p.f];

      // gravity (local) + buoyancy
      const g = state.gravity * state.gSign;
      const buoy = (1.0 - spec.density) * 190 * state.gSign; // flips with gravity
      p.vy += (g + buoy) * dt;

      // damping
      const damp = Math.exp(-2.6 * dt);
      p.vx *= damp;
      p.vy *= damp;

      // mouse stirring (local)
      const dxm = p.x - mx, dym = p.y - my;
      const dm2 = dxm*dxm + dym*dym;
      const R = 95;
      if (dm2 < R*R) {
        const t = 1 - Math.sqrt(dm2) / R;
        const swirl = 44 * t;
        p.vx += (-dym * 0.015) * swirl + mvx * 0.0022 * t;
        p.vy += ( dxm * 0.015) * swirl + mvy * 0.0022 * t;
      }

      // flip shake impulse
      if (shake > 0.001) {
        const s = 100 * shake * dt;
        p.vx += (Math.random()-0.5) * s;
        p.vy += (Math.random()-0.5) * s;
      }

      // local repulsion
      const cx = clamp((p.x / cell) | 0, 0, gw-1);
      const cy = clamp((p.y / cell) | 0, 0, gh-1);
      for (let oy = -1; oy <= 1; oy++) for (let ox = -1; ox <= 1; ox++) {
        const nx = cx + ox, ny = cy + oy;
        if (nx < 0 || nx >= gw || ny < 0 || ny >= gh) continue;
        const arr = buckets[nx + ny*gw];
        for (let k = 0; k < arr.length; k++) {
          const j = arr[k];
          if (j === i) continue;
          const q = P[j];
          const dx = p.x - q.x, dy = p.y - q.y;
          const rr = (p.r + q.r) * 1.4;
          const d2 = dx*dx + dy*dy;
          if (d2 > 0.0001 && d2 < rr*rr) {
            const d = Math.sqrt(d2);
            const push = (rr - d) / rr;
            const nx = dx / d, ny = dy / d;
            const same = (p.f === q.f) ? 1.0 : 0.62;
            p.vx += nx * 58 * push * same * dt;
            p.vy += ny * 58 * push * same * dt;
          }
        }
      }

      // integrate
      p.x += p.vx * dt;
      p.y += p.vy * dt;

      // boundary clamp (local)
      p.y = clamp(p.y, 8, H - 8);
      const [xl, xr] = containerX(p.y);
      const left = xl + p.r + 2;
      const right = xr - p.r - 2;
      if (p.x < left) { p.x = left; p.vx *= -0.45; }
      if (p.x > right){ p.x = right; p.vx *= -0.45; }
      if (p.y <= 8) { p.y = 8; p.vy *= -0.35; }
      if (p.y >= H-8){ p.y = H-8; p.vy *= -0.35; }
    }
  }

  // ====== Draw (rotate entire bottle visually) ======
  function drawBottleAndParticles() {
    const W = state.viewW, H = state.viewH;

    // glass outline path
    ctx.beginPath();
    for (let y = 0; y <= H; y += 6) {
      const [xl] = containerX(y);
      if (y === 0) ctx.moveTo(xl, y);
      else ctx.lineTo(xl, y);
    }
    for (let y = H; y >= 0; y -= 6) {
      const [, xr] = containerX(y);
      ctx.lineTo(xr, y);
    }
    ctx.closePath();

    // glass fill + rim
    ctx.save();
    ctx.globalAlpha = 0.92;
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.22)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // inner highlight
    ctx.globalAlpha = 0.46;
    ctx.beginPath();
    for (let y = 0; y <= H; y += 8) {
      const [xl, xr] = containerX(y);
      const hx = xl + (xr - xl) * 0.22;
      if (y === 0) ctx.moveTo(hx, y);
      else ctx.lineTo(hx, y);
    }
    ctx.strokeStyle = 'rgba(255,255,255,0.18)';
    ctx.lineWidth = 6;
    ctx.stroke();
    ctx.restore();

    // particles
    const P = state.particles;
    for (let i = 0; i < P.length; i++) {
      const p = P[i];
      const spec = FLUIDS[p.f];
      const r = p.r * 2.25;
      const g = ctx.createRadialGradient(p.x - p.r*0.4, p.y - p.r*0.4, 0.8, p.x, p.y, r);
      g.addColorStop(0, spec.colorA);
      g.addColorStop(1, spec.colorB);
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(p.x, p.y, r, 0, Math.PI*2);
      ctx.fill();
    }
  }

  function draw() {
    const W = state.viewW, H = state.viewH;
    ctx.clearRect(0, 0, W, H);

    // animate rotation toward targetAngle (smooth)
    const a = state.angle;
    const diff = normAngle(state.targetAngle - a);
    state.angle = a + diff * (1 - Math.exp(-10.0 * state._dt)); // exponential smoothing

    // rotate whole bottle around center
    const cx = W*0.5, cy = H*0.5;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(state.angle);
    ctx.translate(-cx, -cy);
    drawBottleAndParticles();
    ctx.restore();

    // overlay text
    ctx.save();
    ctx.globalAlpha = 0.85;
    ctx.fillStyle = 'rgba(255,255,255,0.75)';
    ctx.font = '12px ui-sans-serif, system-ui';
    const txt = `Bottle: ${Math.abs(normAngle(state.angle)) > 1.57 ? 'Upside Down' : 'Upright'}  |  Particles: ${state.particles.length}`;
    ctx.fillText(txt, 14, H - 14);
    ctx.restore();
  }

  function loop(t) {
    const dt = Math.min(0.022, Math.max(0.001, (t - state.lastT) / 1000));
    state.lastT = t;
    state._dt = dt;

    // run physics a bit more than draw smoothing
    const sub = 2;
    for (let i = 0; i < sub; i++) step(dt / sub);

    draw();
    requestAnimationFrame(loop);
  }

  // boot
  fit();
  seedParticles();
  window.addEventListener('resize', () => { fit(); seedParticles(); });
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
